name: cyber-detect-pipeline

services:

  kafka:
    image: apache/kafka:latest
    container_name: cd_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - pipeline-net

  redpanda-console:
    image: redpandadata/console:latest
    container_name: cd_redpanda_console
    ports:
      - "8080:8080"
    environment:
      KAFKA_BROKERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - pipeline-net

  jaeger:
    image: jaegertracing/all-in-one:1.57
    container_name: cd_jaeger
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC
      - "4318:4318"     # OTLP HTTP
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    networks:
      - pipeline-net

  jupyterlab:
    build:
      context: .
      dockerfile: Dockerfile.jupyter
    container_name: cd_jupyterlab
    ports:
      - "8888:8888"
    volumes:
      - ./notebooks:/home/jovyan/work/notebooks
      - ../src:/home/jovyan/work/src
      - ../models:/home/jovyan/work/models
      - ./pipeline_data:/home/jovyan/work/pipeline_data
      - ../data:/home/jovyan/work/data
    environment:
      JUPYTER_TOKEN: "cyberdetect"
      KAFKA_BOOTSTRAP: "kafka:9092"
      JAEGER_ENDPOINT: "jaeger:4317"
    working_dir: /home/jovyan/work
    depends_on:
      kafka:
        condition: service_healthy
      jaeger:
        condition: service_started
    networks:
      - pipeline-net

networks:
  pipeline-net:
    driver: bridge
