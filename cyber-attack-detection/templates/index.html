<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cyber Attack Detection Agent</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --border: #30363d;
      --text: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --danger: #f85149;
      --success: #3fb950;
      --warning: #d29922;
      --tag-bg: #21262d;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      min-height: 100vh;
    }

    header {
      border-bottom: 1px solid var(--border);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header .logo {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    header .subtitle {
      font-size: 13px;
      color: var(--muted);
    }

    header .mitre-badge {
      margin-left: auto;
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 4px 12px;
      font-size: 12px;
      color: var(--muted);
    }

    .main {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      padding: 24px 32px;
      max-width: 1400px;
      margin: 0 auto;
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .panel-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    textarea {
      width: 100%;
      height: 420px;
      background: transparent;
      border: none;
      color: var(--text);
      font-family: 'Cascadia Code', 'Fira Code', 'Consolas', monospace;
      font-size: 13px;
      line-height: 1.6;
      padding: 16px;
      resize: none;
      outline: none;
    }

    textarea::placeholder { color: var(--muted); }

    .actions {
      padding: 12px 16px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
      align-items: center;
    }

    button.analyze-btn {
      background: var(--accent);
      color: #0d1117;
      border: none;
      border-radius: 6px;
      padding: 8px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }

    button.analyze-btn:hover { opacity: 0.85; }
    button.analyze-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    button.clear-btn {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 16px;
      font-size: 13px;
      cursor: pointer;
    }

    button.clear-btn:hover { color: var(--text); border-color: var(--muted); }

    .examples {
      margin-left: auto;
      display: flex;
      gap: 6px;
    }

    .example-btn {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 4px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }

    .example-btn:hover { color: var(--text); border-color: var(--accent); }

    /* Results panel */
    .results-body { padding: 16px; min-height: 420px; }

    .placeholder {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 360px;
      color: var(--muted);
      gap: 8px;
    }

    .placeholder .icon { font-size: 48px; opacity: 0.3; }

    .verdict {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-radius: 8px;
      margin-bottom: 16px;
      border: 1px solid;
    }

    .verdict.attack {
      background: rgba(248, 81, 73, 0.08);
      border-color: rgba(248, 81, 73, 0.3);
    }

    .verdict.normal {
      background: rgba(63, 185, 80, 0.08);
      border-color: rgba(63, 185, 80, 0.3);
    }

    .verdict-icon { font-size: 28px; }

    .verdict-title {
      font-size: 18px;
      font-weight: 700;
    }

    .verdict.attack .verdict-title { color: var(--danger); }
    .verdict.normal .verdict-title { color: var(--success); }

    .verdict-sub { font-size: 13px; color: var(--muted); }

    .confidence-bar-wrap {
      margin-left: auto;
      text-align: right;
    }

    .confidence-bar-wrap .pct {
      font-size: 22px;
      font-weight: 700;
    }

    .verdict.attack .pct { color: var(--danger); }
    .verdict.normal .pct { color: var(--success); }

    .confidence-bar-wrap .label { font-size: 11px; color: var(--muted); }

    .section { margin-bottom: 16px; }

    .section-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .mitre-card {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
    }

    .mitre-id {
      font-family: monospace;
      font-size: 14px;
      color: var(--accent);
      font-weight: 700;
      margin-bottom: 4px;
    }

    .mitre-name {
      font-size: 15px;
      font-weight: 600;
      margin-bottom: 6px;
    }

    .tactic-badge {
      display: inline-block;
      background: rgba(88, 166, 255, 0.1);
      border: 1px solid rgba(88, 166, 255, 0.3);
      color: var(--accent);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
      margin-bottom: 10px;
    }

    .mitre-desc {
      font-size: 13px;
      color: var(--muted);
      line-height: 1.6;
      margin-bottom: 10px;
    }

    .mitre-links { font-size: 12px; }
    .mitre-links a { color: var(--accent); text-decoration: none; }
    .mitre-links a:hover { text-decoration: underline; }

    .analysis-text {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 14px;
      font-size: 13px;
      line-height: 1.7;
      color: var(--text);
      white-space: pre-wrap;
    }

    .feature-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
      gap: 8px;
    }

    .feature-item {
      background: var(--tag-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }

    .feature-name { font-size: 11px; color: var(--muted); margin-bottom: 2px; }
    .feature-val {
      font-size: 15px;
      font-weight: 700;
      font-family: monospace;
    }

    .feature-val.flag-on { color: var(--danger); }
    .feature-val.flag-off { color: var(--muted); }

    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .error-box {
      background: rgba(248, 81, 73, 0.08);
      border: 1px solid rgba(248, 81, 73, 0.3);
      border-radius: 8px;
      padding: 14px;
      color: var(--danger);
      font-size: 13px;
    }

    .mitigations-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .mitigations-list li {
      font-size: 13px;
      color: var(--muted);
      padding-left: 14px;
      position: relative;
    }

    .mitigations-list li::before {
      content: '›';
      position: absolute;
      left: 0;
      color: var(--accent);
    }
  </style>
</head>
<body>

<header>
  <div>
    <div class="logo">⚔ CyberDetect</div>
    <div class="subtitle">CSIC 2010 · MITRE ATT&CK</div>
  </div>
  <div class="mitre-badge">ATT&CK v14</div>
</header>

<div class="main">

  <!-- Input panel -->
  <div class="panel">
    <div class="panel-header">
      HTTP Request Input
    </div>
    <textarea id="requestInput" placeholder="Paste a raw HTTP request here...

Example:
POST /login HTTP/1.1
Host: example.com
Content-Type: application/x-www-form-urlencoded

username=admin'--&password=anything"></textarea>
    <div class="actions">
      <button class="analyze-btn" id="analyzeBtn" onclick="doAnalyze()">
        Analyze
      </button>
      <div class="spinner" id="spinner"></div>
      <button class="clear-btn" onclick="clearAll()">Clear</button>
      <div class="examples">
        <button class="example-btn" onclick="loadExample('sqli')">SQL Inj.</button>
        <button class="example-btn" onclick="loadExample('xss')">XSS</button>
        <button class="example-btn" onclick="loadExample('cmd')">Cmd Inj.</button>
        <button class="example-btn" onclick="loadExample('normal')">Normal</button>
      </div>
    </div>
  </div>

  <!-- Results panel -->
  <div class="panel">
    <div class="panel-header">Analysis Result</div>
    <div class="results-body" id="resultsBody">
      <div class="placeholder">
        <div class="icon">🛡</div>
        <div>Paste an HTTP request and click <strong>Analyze</strong></div>
      </div>
    </div>
  </div>

</div>

<script>
  const EXAMPLES = {
    sqli: `POST /tienda1/publico/autenticar.jsp HTTP/1.1
Host: localhost
Content-Type: application/x-www-form-urlencoded
Content-Length: 50

correo=admin'%20OR%20'1'%3D'1'--&password=anything`,

    xss: `GET /tienda1/publico/buscar.jsp?query=<script>alert(document.cookie)<\/script> HTTP/1.1
Host: localhost
User-Agent: Mozilla/5.0
Accept: text/html`,

    cmd: `GET /cgi-bin/test.cgi?input=;cat+/etc/passwd HTTP/1.1
Host: localhost
User-Agent: Mozilla/5.0
Accept: */*`,

    normal: `GET /tienda1/publico/anadir.jsp?id=3&cantidad=1&B1=A%C3%B1adir+al+carrito HTTP/1.1
Host: localhost
User-Agent: Mozilla/5.0 (compatible; Konqueror/3.5; Linux)
Pragma: no-cache
Cache-control: no-cache
Accept: text/xml,application/xml,application/xhtml+xml,text/html;q=0.9
Accept-Encoding: gzip, deflate
Accept-Charset: utf-8, utf-16, *;q=0.1
Accept-Language: en
Connection: close`,
  };

  function loadExample(key) {
    document.getElementById('requestInput').value = EXAMPLES[key];
  }

  function clearAll() {
    document.getElementById('requestInput').value = '';
    document.getElementById('resultsBody').innerHTML = `
      <div class="placeholder">
        <div class="icon">🛡</div>
        <div>Paste an HTTP request and click <strong>Analyze</strong></div>
      </div>`;
  }

  async function doAnalyze() {
    const raw = document.getElementById('requestInput').value.trim();
    if (!raw) return;

    const btn = document.getElementById('analyzeBtn');
    const spinner = document.getElementById('spinner');
    btn.disabled = true;
    spinner.style.display = 'block';

    try {
      const res = await fetch('/analyze', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ request: raw }),
      });
      const data = await res.json();
      renderResults(data);
    } catch (e) {
      document.getElementById('resultsBody').innerHTML =
        `<div class="error-box">Error: ${e.message}</div>`;
    } finally {
      btn.disabled = false;
      spinner.style.display = 'none';
    }
  }

  function renderResults(data) {
    if (data.error) {
      document.getElementById('resultsBody').innerHTML =
        `<div class="error-box">Error: ${data.error}</div>`;
      return;
    }

    const pct = Math.round((data.confidence || 0) * 100);
    const isAttack = data.is_attack;
    const attackLabel = (data.attack_type || 'unknown').replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());

    let html = `
      <div class="verdict ${isAttack ? 'attack' : 'normal'}">
        <div class="verdict-icon">${isAttack ? '🚨' : '✅'}</div>
        <div>
          <div class="verdict-title">${isAttack ? 'ATTACK DETECTED' : 'NORMAL TRAFFIC'}</div>
          <div class="verdict-sub">${isAttack ? attackLabel : 'No malicious patterns found'}</div>
        </div>
        <div class="confidence-bar-wrap">
          <div class="pct">${pct}%</div>
          <div class="label">confidence</div>
        </div>
      </div>`;

    if (isAttack && data.mitre) {
      const m = data.mitre;
      html += `
        <div class="section">
          <div class="section-title">MITRE ATT&CK Technique</div>
          <div class="mitre-card">
            <div class="mitre-id">${m.id || 'N/A'}</div>
            <div class="mitre-name">${m.name || ''}</div>
            <span class="tactic-badge">${m.tactic_id || ''} · ${m.tactic || ''}</span>
            <div class="mitre-desc">${m.description || ''}</div>
            ${m.mitigations && m.mitigations.length ? `
              <div class="section-title" style="margin-top:8px;">Recommended Mitigations</div>
              <ul class="mitigations-list">
                ${m.mitigations.map(mg => `<li>${mg}</li>`).join('')}
              </ul>` : ''}
            ${m.references && m.references.length ? `
              <div class="mitre-links" style="margin-top:10px;">
                <a href="${m.references[0]}" target="_blank">View on MITRE ATT&CK ↗</a>
              </div>` : ''}
          </div>
        </div>`;
    }

    if (data.analysis) {
      html += `
        <div class="section">
          <div class="section-title">AI Analysis</div>
          <div class="analysis-text">${escapeHtml(data.analysis)}</div>
        </div>`;
    }

    if (data.features) {
      const flagFeatures = ['has_sql_keyword','has_sql_operator','has_xss','has_cmd_injection',
                            'has_path_traversal','has_ldap_pattern','has_encoding_anomaly'];
      const numFeatures = ['url_length','body_length','num_params','sql_keyword_count','encoded_chars_count'];

      html += `<div class="section">
        <div class="section-title">Extracted Features</div>
        <div class="feature-grid">`;

      for (const k of flagFeatures) {
        const v = data.features[k];
        const on = v > 0;
        html += `<div class="feature-item">
          <div class="feature-name">${k.replace(/_/g,' ')}</div>
          <div class="feature-val ${on ? 'flag-on' : 'flag-off'}">${on ? 'YES' : 'no'}</div>
        </div>`;
      }

      for (const k of numFeatures) {
        const v = data.features[k];
        html += `<div class="feature-item">
          <div class="feature-name">${k.replace(/_/g,' ')}</div>
          <div class="feature-val">${v}</div>
        </div>`;
      }

      html += `</div></div>`;
    }

    document.getElementById('resultsBody').innerHTML = html;
  }

  function escapeHtml(text) {
    return text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }
</script>

</body>
</html>
